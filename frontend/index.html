<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frontend</title>
  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      if (msg.includes('ResizeObserver')) return false;
      var div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:10%;left:10%;right:10%;z-index:999999;background:red;color:white;padding:20px;font-size:20px;border-radius:10px;box-shadow:0 0 20px black;';
      div.innerHTML = '<h2>CRASH DETECTED IN CHROME!</h2><p>' + msg + '</p><p>' + url + ':' + lineNo + '</p>';
      document.body.appendChild(div);
      return false;
    };
    window.addEventListener("unhandledrejection", function (event) {
      var div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:50%;left:10%;right:10%;z-index:999999;background:darkred;color:white;padding:20px;font-size:20px;border-radius:10px;box-shadow:0 0 20px black;';
      div.innerHTML = '<h2>PROMISE CRASH DETECTED!</h2><p>' + (event.reason && event.reason.message ? event.reason.message : event.reason) + '</p>';
      document.body.appendChild(div);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
